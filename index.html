<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xplorer IDEX Twin AFC - Assembly Manual</title>
    <style>
        :root { --accent: #2563eb; --bg: #ffffff; --sidebar: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body.dark-mode { --bg: #121212; --sidebar: #1a1a1a; --text: #e2e8f0; --border: #333; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: background 0.3s; }
        
        /* Sidebar */
        .sidebar { width: 340px; padding: 25px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .progress-container { width: 100%; height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        #step-counter { font-size: 11px; color: #94a3b8; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        select { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: bold; cursor: pointer; }
        
        .step-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        h1 { font-size: 20px; margin: 5px 0; color: var(--accent); }
        #step-desc { line-height: 1.6; font-size: 14px; margin-bottom: 20px; }
        #step-desc b, #step-desc strong { color: var(--text); display: block; margin-top: 15px; }

        .nav-btns { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .ui-controls { display: flex; gap: 5px; margin-top: 10px; }
        .reset-btn, .theme-btn { font-size: 11px; padding: 8px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .reset-btn { background: #64748b; flex: 2; }
        .theme-btn { background: #444; flex: 1; }

        /* Viewport Logic */
        #viewport { flex-grow: 1; position: relative; background: #ffffff; display: flex; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        
        /* Full-screen Media Fix */
        #media-container { 
            width: 100%; 
            height: 100%; 
            display: none; 
            background: #ffffff; 
            overflow: hidden; 
            position: absolute;
            top: 0;
            left: 0;
        }
        #media-container iframe { width: 100%; height: 100%; border: none; display: block; }
        #media-container img { max-width: 100%; max-height: 100%; object-fit: contain; margin: auto; }

        #loader-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: var(--accent); font-weight: bold; }
        .hint { position: absolute; bottom: 20px; right: 20px; font-size: 11px; color: #94a3b8; background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 20px; pointer-events: none;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <div id="step-counter">Step 1 of 1</div>
        <label style="font-size: 10px; color: #94a3b8; font-weight: bold;">CHAPTER</label>
        <select id="chapterSelect" onchange="loadChapter(this.value)"></select>

        <div class="step-content">
            <h1 id="step-title">Xplorer IDEX Twin AFC</h1>
            <div id="step-desc">Loading manual instructions...</div>
            <div class="ui-controls">
                <button id="resetViewBtn" class="reset-btn" onclick="fitCameraToModel()">Reset Camera</button>
                <button class="theme-btn" onclick="document.body.classList.toggle('dark-mode')">Dark Mode</button>
            </div>
        </div>

        <div class="nav-btns">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Back</button>
            <button id="nextBtn" onclick="changeStep(1)" disabled>Next</button>
        </div>
    </div>

    <div id="viewport">
        <div id="loader-ui">Loading 3D Model...</div>
        <div id="canvas-container"></div>
        <div id="media-container"></div>
        <div id="3d-hint" class="hint">Left Click: Rotate | Right Click: Pan | Scroll: Zoom</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

        let menuData = [], currentChapIdx = 0, currentStepIdx = 0;
        let scene, camera, renderer, controls, currentModel, mixer;
        const loader = new GLTFLoader();
        const clock = new THREE.Clock();

        fetch('menu.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                menuData = data;
                populateChapters();
                initThree();
                loadStep(0, 0);
            });

        function populateChapters() {
            const select = document.getElementById('chapterSelect');
            menuData.forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index; opt.innerHTML = item.chapter;
                select.appendChild(opt);
            });
        }

        window.loadChapter = (idx) => loadStep(parseInt(idx), 0);
        window.changeStep = (dir) => loadStep(currentChapIdx, currentStepIdx + dir);

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 340) / window.innerHeight, 0.1, 3000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2.0);
            scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
            dirLight.position.set(5, 10, 7.5);
            scene.add(dirLight);

            controls = new ArcballControls(camera, renderer.domElement, scene);
            controls.setGizmosVisible(false);
            animate();
        }

        function loadStep(chapIdx, stepIdx) {
            currentChapIdx = chapIdx;
            currentStepIdx = stepIdx;
            const chapter = menuData[chapIdx];
            const step = chapter.steps[stepIdx];
            const fileName = step.file.toLowerCase();
            const version = '?v=' + new Date().getTime();

            document.getElementById('progress-fill').style.width = `${((stepIdx + 1) / chapter.steps.length) * 100}%`;
            document.getElementById('step-counter').innerText = `Step ${stepIdx + 1} of ${chapter.steps.length}`;
            document.getElementById('step-title').innerText = step.title;
            document.getElementById('step-desc').innerHTML = step.desc.replace(/\n/g, '<br>');
            document.getElementById('prevBtn').disabled = (stepIdx === 0);
            document.getElementById('nextBtn').disabled = (stepIdx === chapter.steps.length - 1);
            document.getElementById('chapterSelect').value = chapIdx;

            const canvasDiv = document.getElementById('canvas-container');
            const mediaDiv = document.getElementById('media-container');
            const loaderUI = document.getElementById('loader-ui');
            const resetBtn = document.getElementById('resetViewBtn');
            const hint = document.getElementById('3d-hint');

            if (fileName.endsWith('.glb') || fileName.endsWith('.gltf')) {
                canvasDiv.style.display = "block";
                mediaDiv.style.display = "none";
                loaderUI.style.display = "block";
                resetBtn.style.display = "block";
                hint.style.display = "block";

                if (currentModel) scene.remove(currentModel);
                
                loader.load(encodeURI(step.file) + version, (gltf) => {
                    loaderUI.style.display = "none";
                    currentModel = gltf.scene;
                    if (gltf.animations && gltf.animations.length) {
                        mixer = new THREE.AnimationMixer(currentModel);
                        gltf.animations.forEach((clip) => { mixer.clipAction(clip).play(); });
                    } else { mixer = null; }
                    currentModel.traverse(node => {
                        if (node.isMesh) {
                            const edges = new THREE.EdgesGeometry(node.geometry, 15);
                            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x444444 }));
                            node.add(line);
                        }
                    });
                    const box = new THREE.Box3().setFromObject(currentModel);
                    currentModel.position.sub(box.getCenter(new THREE.Vector3()));
                    scene.add(currentModel);
                    fitCameraToModel();
                });
            } else {
                canvasDiv.style.display = "none";
                loaderUI.style.display = "none";
                resetBtn.style.display = "none";
                hint.style.display = "none";
                mediaDiv.style.display = "flex";

                const mediaUrl = encodeURI(step.file) + version;

                if (fileName.endsWith('.pdf')) {
                    mediaDiv.innerHTML = `<iframe src="${mediaUrl}"></iframe>`;
                } else {
                    mediaDiv.innerHTML = `<img src="${mediaUrl}" style="padding: 20px;">`;
                }
            }
        }

        window.fitCameraToModel = () => {
            if (!currentModel) return;
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const dist = (maxDim / (2 * Math.tan((camera.fov * Math.PI / 180) / 2))) * 1.15;
            camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
            camera.lookAt(0, 0, 0);
            controls.target.set(0,0,0);
            controls.update();
        };

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
        
        window.onresize = () => {
            camera.aspect = (window.innerWidth - 340) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
        };
    </script>
</body>
</html>
