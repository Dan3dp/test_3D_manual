<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Light Studio CAD Manual</title>
    <style>
        :root { 
            --accent: #2563eb; 
            --bg: #ffffff; /* Main Background */
            --sidebar: #f8fafc; /* Light Sidebar */
            --text: #1e293b; 
            --subtext: #64748b;
        }
        
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .sidebar { 
            width: 340px; 
            padding: 30px; 
            background: var(--sidebar); 
            border-right: 1px solid #e2e8f0; 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
        }
        
        .step-content { flex-grow: 1; }
        .step-num { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        h1 { font-size: 24px; margin: 10px 0; color: #0f172a; }
        p { line-height: 1.6; color: var(--subtext); font-size: 15px; }
        
        .nav-btns { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        button { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            background: var(--accent); 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }
        button:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; transform: none; }

        #container { flex-grow: 1; position: relative; outline: none; }
        .hint { 
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            font-size: 11px; 
            color: #94a3b8; 
            background: rgba(255,255,255,0.8); 
            padding: 5px 12px; 
            border: 1px solid #e2e8f0;
            border-radius: 20px; 
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="step-content">
            <div id="step-num" class="step-num">Step 01</div>
            <h1 id="step-title">Y-Axis Assembly</h1>
            <p id="step-desc">Loading assembly instructions...</p>
        </div>
        <div class="nav-btns">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Back</button>
            <button id="nextBtn" onclick="changeStep(1)">Next Step</button>
        </div>
    </div>

    <div id="container">
        <div class="hint">Left Click: CAD Rotate | Right Click: Pan | Scroll: Zoom</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

        const steps = [
            {
                num: "Step 01",
                title: "Y-Axis Beam",
                desc: "Place the MGN linear rail on the extrusion. Ensure the T-nuts are aligned.",
                file: "100_01__Beam_MGN_Y_Axis__asmbl___V1.glb"
            },
            {
                num: "Step 02",
                title: "Motor Mount",
                desc: "Secure the NEMA 17 motor using four M3 screws.",
                file: "step2_motor.glb" 
            }
        ];

        let currentIdx = 0;
        let scene, camera, renderer, controls, currentModel;
        const loader = new GLTFLoader();

        init();

        function init() {
            scene = new THREE.Scene();
            
            // --- LIGHT BACKGROUND COLOR ---
            scene.background = new THREE.Color(0xf1f5f9); // Light blue-grey
            // You can also use 0xffffff for pure white

            camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 340) / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 2, 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('container').appendChild(renderer.domElement);

            // Brightened lighting for a white background
            const sun = new THREE.DirectionalLight(0xffffff, 2.5);
            sun.position.set(5, 10, 7.5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            controls = new ArcballControls(camera, renderer.domElement, scene);
            controls.setGizmosVisible(false);

            loadModel(steps[currentIdx].file);
            updateUI();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function loadModel(url) {
            if (currentModel) scene.remove(currentModel);

            loader.load(url, (gltf) => {
                currentModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                currentModel.position.sub(center);
                scene.add(currentModel);
            });
        }

        function updateUI() {
            const s = steps[currentIdx];
            document.getElementById('step-num').innerText = s.num;
            document.getElementById('step-title').innerText = s.title;
            document.getElementById('step-desc').innerText = s.desc;
            document.getElementById('prevBtn').disabled = (currentIdx === 0);
            document.getElementById('nextBtn').disabled = (currentIdx === steps.length - 1);
        }

        window.changeStep = (dir) => {
            currentIdx += dir;
            loadModel(steps[currentIdx].file);
            updateUI();
        };

        function onWindowResize() {
            camera.aspect = (window.innerWidth - 340) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
