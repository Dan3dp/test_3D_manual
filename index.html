<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Assembly Manual</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: #f4f4f9;
            overflow: hidden;
        }

        /* Left Side: Instructions */
        .sidebar {
            width: 380px;
            padding: 40px;
            background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .step-info {
            flex-grow: 1;
        }

        .step-number {
            font-weight: bold;
            color: #2563eb;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        h1 {
            margin: 10px 0;
            font-size: 22px;
            color: #111827;
        }

        p {
            line-height: 1.6;
            color: #4b5563;
            font-size: 1rem;
        }

        /* Navigation Buttons */
        .nav-controls {
            display: flex;
            gap: 15px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        /* Right Side: 3D Model */
        .viewer-container {
            flex-grow: 1;
            background: radial-gradient(circle, #ffffff 0%, #e5e7eb 100%);
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            outline: none;
            /* Focus the camera on the center of the object */
            --min-hotspot-opacity: 0;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="step-info">
            <span id="step-label" class="step-number">Step 01</span>
            <h1 id="step-title">Y-Axis Beam Assembly</h1>
            <p id="step-desc">
                Begin by inspecting the aluminum extrusion. Ensure there is no debris in the slots. 
                Position the MGN linear rail on the top face as shown in the 3D model.
            </p>
        </div>

        <div class="nav-controls">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Previous</button>
            <button id="nextBtn" onclick="changeStep(1)">Next Step</button>
        </div>
    </div>

    <div class="viewer-container">
        <model-viewer 
            id="manual-viewer"
            src="100_01__Beam_MGN_Y_Axis__asmbl___V1.glb" 
            alt="3D CAD Model"
            camera-controls 
            touch-action="none"
            camera-orbit="45deg 75deg auto"
            min-camera-orbit="auto auto auto"
            max-camera-orbit="auto auto auto"
            interpolation-decay="200"
            shadow-intensity="1" 
            environment-image="neutral"
            exposure="1">
        </model-viewer>
        
        <div class="hint">Left Click: Rotate 360° | Right Click: Pan | Scroll: Zoom</div>
    </div>

    <script>
        // Define your steps here
        const steps = [
            {
                label: "Step 01",
                title: "Y-Axis Beam Assembly",
                desc: "Begin by inspecting the aluminum extrusion. Position the MGN linear rail on the top face.",
                file: "100_01__Beam_MGN_Y_Axis__asmbl___V1.glb"
            },
            {
                label: "Step 02",
                title: "Mounting the Motor",
                desc: "Attach the NEMA 17 motor to the end bracket using four M3x10mm screws.",
                file: "step2_motor.glb" 
            }
        ];

        let currentStep = 0;
        const viewer = document.getElementById('manual-viewer');

        function changeStep(direction) {
            currentStep += direction;

            // Update UI text
            document.getElementById('step-label').innerText = steps[currentStep].label;
            document.getElementById('step-title').innerText = steps[currentStep].title;
            document.getElementById('step-desc').innerText = steps[currentStep].desc;
            
            // Update 3D Model
            viewer.src = steps[currentStep].file;

            // Manage button states
            document.getElementById('prevBtn').disabled = (currentStep === 0);
            document.getElementById('nextBtn').disabled = (currentStep === steps.length - 1);
        }
    </script>

</body>
</html>
