<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xplorer IDEX Twin AFC - Professional Manual</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --accent: #2563eb; --bg: #ffffff; --sidebar: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body.dark-mode { --bg: #121212; --sidebar: #1a1a1a; --text: #e2e8f0; --border: #333; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        .sidebar { width: 340px; padding: 25px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .progress-container { width: 100%; height: 6px; background: var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease; }
        select { width: 100%; padding: 10px; margin-bottom: 20px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: bold; cursor: pointer; }
        .step-content { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        h1 { font-size: 22px; margin: 5px 0; color: var(--accent); line-height: 1.2; }
        #step-desc { line-height: 1.6; font-size: 14px; margin-bottom: 20px; color: var(--text); }
        .nav-btns { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; font-weight: bold; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        #viewport { flex-grow: 1; position: relative; background: #ffffff; }
        #canvas-container { width: 100%; height: 100%; position: absolute; }
        #loader-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; color: var(--accent); font-weight: bold; z-index: 5; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="progress-container"><div id="progress-fill"></div></div>
        <select id="chapterSelect" onchange="loadChapter(this.value)"></select>
        <div class="step-content">
            <h1 id="step-title">Xplorer IDEX</h1>
            <div id="step-desc">Loading...</div>
            <button style="margin-top:10px; background:#64748b; color:white; border:none; padding:8px; border-radius:4px; font-size:11px; cursor:pointer;" onclick="fitCameraToModel()">Center View</button>
        </div>
        <div class="nav-btns">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Back</button>
            <button id="nextBtn" onclick="changeStep(1)" disabled>Next</button>
        </div>
    </div>
    <div id="viewport">
        <div id="loader-ui">Processing High-Precision 3D...</div>
        <div id="canvas-container"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ArcballControls } from 'three/addons/controls/ArcballControls.js';

        let menuData = [], currentChapIdx = 0, currentStepIdx = 0;
        let scene, camera, renderer, controls, currentModel;
        const loader = new GLTFLoader();

        fetch('menu.json?v=' + new Date().getTime())
            .then(res => res.json())
            .then(data => {
                menuData = data;
                populateChapters();
                initThree();
                loadStep(0, 0);
            });

        function initThree() {
            scene = new THREE.Scene();
            
            // CAMERA FIX: Near plane set to 1.0, Far to 50,000 for massive scale range.
            camera = new THREE.PerspectiveCamera(40, (window.innerWidth - 340) / window.innerHeight, 1.0, 50000);
            
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true,
                logarithmicDepthBuffer: true, // Forces high-precision depth calculation
                precision: "highp"            // Uses high-precision shaders
            });
            renderer.setSize(window.innerWidth - 340, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Studio Lighting
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3.0));
            const light1 = new THREE.DirectionalLight(0xffffff, 2.0);
            light1.position.set(1000, 2000, 1500);
            scene.add(light1);

            controls = new ArcballControls(camera, renderer.domElement, scene);
            controls.setGizmosVisible(false);
            animate();
        }

        async function loadStep(chapIdx, stepIdx) {
            currentChapIdx = chapIdx;
            currentStepIdx = stepIdx;
            const step = menuData[chapIdx].steps[stepIdx];
            const version = '?v=' + new Date().getTime();

            document.getElementById('step-title').innerText = step.title;
            const loaderUI = document.getElementById('loader-ui');
            loaderUI.style.display = "block";

            if (step.desc_file) {
                const res = await fetch(step.desc_file + version);
                const text = await res.text();
                document.getElementById('step-desc').innerHTML = marked.parse(text);
            }

            if (currentModel) scene.remove(currentModel);

            loader.load(step.file + version, (gltf) => {
                currentModel = gltf.scene;
                
                currentModel.traverse(node => {
                    if (node.isMesh) {
                        // THE SOLIDITY FIX:
                        node.material.transparent = false;
                        node.material.depthWrite = true;
                        node.material.depthTest = true;
                        node.material.alphaTest = 0.5;
                        node.material.side = THREE.FrontSide; // Only render outside faces
                        
                        // Technical Lines
                        const edges = new THREE.EdgesGeometry(node.geometry, 25);
                        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                        node.add(line);
                    }
                });

                const box = new THREE.Box3().setFromObject(currentModel);
                currentModel.position.sub(box.getCenter(new THREE.Vector3()));
                scene.add(currentModel);
                fitCameraToModel();
                loaderUI.style.display = "none";
            });
        }

        window.fitCameraToModel = () => {
            if (!currentModel) return;
            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2)) * 1.3;

            camera.position.set(cameraZ, cameraZ, cameraZ);
            camera.updateProjectionMatrix();
            controls.target.set(0, 0, 0);
            controls.update();
        };

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        function populateChapters() {
            const select = document.getElementById('chapterSelect');
            menuData.forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index; opt.innerHTML = item.chapter;
                select.appendChild(opt);
            });
        }
    </script>
</body>
</html>
